name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install fastapi uvicorn sqlalchemy
      - run: pip install aiosqlite pydantic pydantic-settings
      - run: pip install python-jose passlib bcrypt
      - run: pip install python-multipart pytest pytest-asyncio httpx